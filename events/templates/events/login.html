{% extends 'events/base.html' %}

{% block title %}Login - UniEvents{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <div style="height:6px; background: linear-gradient(90deg, #1a237e, #e53935);
                        border-radius:10px; margin-bottom:20px;"></div>
            <h3 class="fw-bold text-center mb-4" style="color:#1a237e;">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </h3>
            <form method="POST" action="/login/">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-book w-100" style="font-size:1.1rem; padding:12px;">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center text-muted mb-0">
                Don't have an account?
                <a href="/register/" style="color:#e53935; font-weight:700;">
                    <i class="fas fa-user-plus me-1"></i>Create Account
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
